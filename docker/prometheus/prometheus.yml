global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'auto-bads-monitor'

scrape_configs:
  - job_name: 'auto-bads-application'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['autobads:8080']
        labels:
          application: 'auto-bads'
          environment: 'docker'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alerting rules (optional)
# rule_files:
#   - 'alerts.yml'

